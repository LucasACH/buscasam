# ADR-0009 §3,§9,§16. Main config; the server block is generated at container
# start from templates/<TLS_MODE>.conf.template by entrypoint.sh.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json escape=json '{"time":"$time_iso8601","remote":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"bytes":$body_bytes_sent,"rt":$request_time,"ua":"$http_user_agent"}';
    access_log /var/log/nginx/access.log json;

    sendfile on;
    tcp_nopush on;
    server_tokens off;

    # ADR-0006: main file is up to ~50m; one upload request per file.
    client_max_body_size 55m;

    # ADR-0009 §16: per-IP rate zones, applied regardless of an unvalidated sid.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=read_zone:10m rate=60r/m;

    # WebSocket upgrade passthrough.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    # Effective scheme: honour an upstream X-Forwarded-Proto, else our own.
    # In TLS_MODE=upstream this is trusted only from TRUSTED_PROXY_CIDR via the
    # real_ip directives in the server template; self-mode sets $scheme directly.
    map $http_x_forwarded_proto $forwarded_proto {
        default $scheme;
        https   https;
        http    http;
    }

    upstream api      { server api:8000; }
    upstream frontend { server frontend:3000; }

    include /etc/nginx/conf.d/default.conf;
}
