# Shared location blocks (ADR-0009 §3). Included by both TLS-mode server blocks.

# API: preserve the /api/ prefix (proxy_pass without trailing slash, §3).
location = /api/auth/login {
    limit_req zone=auth_zone burst=20 nodelay;
    proxy_pass http://api;
    include /etc/nginx/templates/_proxy_headers.conf;
}
location = /api/auth/google/callback {
    limit_req zone=auth_zone burst=20 nodelay;
    proxy_pass http://api;
    include /etc/nginx/templates/_proxy_headers.conf;
}
location /api/ {
    limit_req zone=read_zone burst=120 nodelay;
    proxy_pass http://api;
    include /etc/nginx/templates/_proxy_headers.conf;
}

# Internal blob delivery (ADR-0006 §9): X-Accel-Redirect target only.
location /_blobs/ {
    internal;
    alias /var/lib/buscasam/blobs/;
    sendfile on;
    tcp_nopush on;
}

# Everything else → Next.js.
location / {
    proxy_pass http://frontend;
    include /etc/nginx/templates/_proxy_headers.conf;
}
