# ADR-0009 §14: Postgres tuning, mounted into the db container. Only overrides
# below; everything unset uses server defaults. Sized for a ~8 GB / 4 vCPU GCE
# VM as a starting point — re-tune against the §14 launch benchmark.

listen_addresses = '*'
max_connections = 100                 # api(1) + worker_default(8) + worker_ocr(1) + migrate/psql headroom

# Memory
shared_buffers = 2GB                  # ~25% RAM
effective_cache_size = 6GB            # ~75% RAM (planner hint, not an allocation)
work_mem = 32MB                       # per sort/hash node; RRF + hybrid search fan-out
maintenance_work_mem = 512MB          # pgvector HNSW builds and VACUUM

# Planner — SSD persistent disk.
random_page_cost = 1.1
effective_io_concurrency = 200

# WAL / checkpoints
wal_compression = on
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# Observability
log_min_duration_statement = 500ms    # log slow queries; pairs with §15 stdout logging
log_checkpoints = on
log_destination = 'stderr'
